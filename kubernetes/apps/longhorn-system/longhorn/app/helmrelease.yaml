---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
  interval: 1h
  values:
    defaultSettings:
      defaultDataPath: /var/lib/longhorn
      defaultReplicaCount: 1
      storageReservedPercentageForDefaultDisk: 10
    persistence:
      defaultClass: false
      defaultClassReplicaCount: 1
    longhornUI:
      replicas: 1
