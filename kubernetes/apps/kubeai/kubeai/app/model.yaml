---
apiVersion: kubeai.org/v1
kind: Model
metadata:
  name: gemma-4-12b-it
  namespace: kubeai
spec:
  features:
    - TextGeneration
  owner: google
  # Google's official QAT w4a16 compressed-tensors checkpoint (~8 GB).
  # vLLM auto-detects the quantization from the checkpoint — no --quantization flag.
  url: hf://google/gemma-4-12B-it-qat-w4a16-ct
  engine: VLLM
  # Stable vLLM (v0.22.1) lacks a native Gemma 4 kernel and falls back to the
  # Transformers backend, which mis-lays-out the w4a16 weights and crashes the
  # Marlin GEMM kernel ("Shape mismatch ... size_k=8192"). The native gemma4
  # kernel only exists in nightly, so pin a specific nightly commit build
  # (reproducible — avoids the moving :nightly tag silently changing).
  image: vllm/vllm-openai:nightly-6fbfdd183145443274df49c09c46cd13ea27af5f
  # Pins to the RTX 3090 node via the HelmRelease resourceProfile nodeSelector.
  resourceProfile: nvidia-gpu-rtx3090-24gb:1
  # Single dedicated GPU: keep one replica warm rather than scaling from zero.
  minReplicas: 1
  maxReplicas: 1
  args:
    # ~8 GB weights leaves ample 24 GB headroom for a large KV cache.
    - --max-model-len=32768
    - --gpu-memory-utilization=0.90
