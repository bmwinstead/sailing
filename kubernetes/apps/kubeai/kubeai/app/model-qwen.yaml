---
apiVersion: kubeai.org/v1
kind: Model
metadata:
  name: qwen3-14b
  namespace: kubeai
spec:
  features:
    - TextGeneration
  owner: qwen
  # Official AWQ-INT4 (~9 GB). Qwen3.6 has no 14B (smallest is 27B), so this is the
  # prior-gen Qwen3-14B — fits the 24 GB 3090 with plenty of headroom, so it runs at
  # full performance (CUDA graphs, long context) unlike the cramped 27B.
  url: hf://Qwen/Qwen3-14B-AWQ
  engine: VLLM
  image: vllm/vllm-openai:v0.22.1
  resourceProfile: nvidia-gpu-rtx3090-24gb:1
  minReplicas: 1
  maxReplicas: 1
  args:
    # 128K context. Qwen3 is natively 32K, so YaRN rope scaling (factor 4) extends it.
    # fp8 KV cache halves per-token KV memory so the ~10 GB cache + ~9 GB weights fit
    # the 24 GB card. Tradeoff: YaRN slightly dulls short-context quality, and a full
    # 128K request monopolizes the KV pool (low concurrency while one is in flight).
    - --max-model-len=131072
    # YaRN rope scaling via --hf-overrides (vLLM dropped the standalone --rope-scaling flag).
    - '--hf-overrides={"rope_scaling":{"rope_type":"yarn","factor":4.0,"original_max_position_embeddings":32768}}'
    - --kv-cache-dtype=fp8
    - --gpu-memory-utilization=0.95
    # Tool calling for OpenClaw agents. Qwen3 dense uses the hermes parser;
    # reasoning-parser keeps <think> output out of content.
    - --enable-auto-tool-choice
    - --tool-call-parser=hermes
    - --reasoning-parser=qwen3
