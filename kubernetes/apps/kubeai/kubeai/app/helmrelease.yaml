---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeai
spec:
  chart:
    spec:
      chart: kubeai
      version: 0.23.2
      sourceRef:
        kind: HelmRepository
        name: kubeai
  interval: 1h
  values:
    # Scrape vLLM's /metrics into the cluster's kube-prometheus-stack. Prometheus
    # watches all namespaces with open selectors, so no extra labels are needed.
    metrics:
      prometheusOperator:
        vLLMPodMonitor:
          enabled: true

    secrets:
      huggingface:
        create: false
        name: kubeai-huggingface-secret

    resourceProfiles:
      nvidia-gpu-rtx3090-24gb:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
        nodeSelector:
          nvidia.com/gpu.family: "ampere"
          nvidia.com/gpu.memory: "24576"
        # pop-os is tainted nvidia.com/gpu=present:NoSchedule (dedicated GPU node, no
        # Longhorn storage) to keep stateful workloads off it. GPU models must tolerate it.
        tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
