---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubeai
spec:
  chart:
    spec:
      chart: kubeai
      version: 0.23.2
      sourceRef:
        kind: HelmRepository
        name: kubeai
  interval: 1h
  values:
    secrets:
      huggingface:
        create: false
        name: kubeai-huggingface-secret

    resourceProfiles:
      nvidia-gpu-rtx3090-24gb:
        limits:
          nvidia.com/gpu: "1"
        requests:
          nvidia.com/gpu: "1"
        nodeSelector:
          nvidia.com/gpu.family: "ampere"
          nvidia.com/gpu.memory: "24576"
