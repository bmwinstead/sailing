---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openclaw
spec:
  interval: 1h
  path: ./kubernetes/apps/openclaw/openclaw/app
  # No postBuild substitution: the config's ${VAR} refs (DISCORD_USER_ID, DISCORD_GUILD_ID,
  # OPENCLAW_HOOK_TOKEN) are interpolated by OpenClaw from the pod env (envFrom secret),
  # NOT by Flux. Flux's ${} substitution would clobber them to empty.
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: openclaw
  wait: false
