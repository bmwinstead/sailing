---
# Control UI via the internal Envoy gateway (LAN only). TLS terminates at Envoy;
# the gateway pod serves plain HTTP on :18789 and is protected by gateway.auth.token.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openclaw
spec:
  hostnames:
    - openclaw.winstead.io
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  rules:
    - backendRefs:
        - name: openclaw
          port: 18789
