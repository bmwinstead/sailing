---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1 # the Gateway is a singleton
  strategy:
    type: Recreate # RWO PVCs can't be held by two pods during rollout
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000 # `node` user in the image
        runAsGroup: 1000
        fsGroup: 1000 # makes the PVCs writable by node
      # Seed baked workspaces into the state PVC without clobbering agent edits.
      initContainers:
        - name: seed-workspaces
          image: ghcr.io/bmwinstead/openclaw-team:sha-60613b1
          command:
            - "sh"
            - "-c"
          args:
            - |
              mkdir -p /home/node/.openclaw/workspaces
              cp -rn /opt/openclaw-workspaces/. /home/node/.openclaw/workspaces/
              # Distribute shared team docs into each agent workspace (agents read
              # TEAM.md/TEAM_PROTOCOL.md/GLOSSARY.md from their own dir). -n preserves edits.
              for a in kev rex scout hawk dash dot pixel; do
                cp -n /opt/openclaw-workspaces/shared/*.md /home/node/.openclaw/workspaces/$a/ 2>/dev/null || true
              done
              echo "workspaces seeded"
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
        # Install external plugins (Discord channel + OpenShell sandbox) into the state
        # PVC (plugins persist under the OpenClaw home = /home/node/.openclaw). Idempotent.
        - name: install-plugins
          image: ghcr.io/bmwinstead/openclaw-team:sha-60613b1
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_SKIP_ONBOARDING
              value: "1"
          command:
            - "sh"
            - "-c"
          args:
            - |
              P=/home/node/.openclaw/npm/projects
              ls "$P" 2>/dev/null | grep -q openclaw-discord || openclaw plugins install @openclaw/discord
              ls "$P" 2>/dev/null | grep -q openclaw-openshell || openclaw plugins install @openclaw/openshell-sandbox
              echo "plugins ready"
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
        # Named agents (kev/hawk) need a per-agent anthropic auth profile — env-based auth
        # only auto-resolves the default provider (openai). Paste the key from the secret
        # into each agent's auth store on the PVC. (Don't set OPENCLAW_CONFIG_PATH here so
        # it writes to the PVC config, not the read-only mount.)
        - name: configure-anthropic-auth
          image: ghcr.io/bmwinstead/openclaw-team:sha-60613b1
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_SKIP_ONBOARDING
              value: "1"
            # Writable config copy (the CLI needs to read agent defs AND write config;
            # the real /etc/openclaw mount is read-only). Credentials still land in the
            # per-agent auth-profiles.json under the state PVC, which the gateway reads.
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
          envFrom:
            - secretRef:
                name: openclaw-secrets
          command:
            - "sh"
            - "-c"
          args:
            - |
              cp /etc/openclaw/openclaw.json /home/node/.openclaw/openclaw.json
              for a in kev hawk; do
                printf '%s' "$ANTHROPIC_API_KEY" | openclaw models auth --agent "$a" paste-api-key --provider anthropic --profile-id anthropic:manual \
                  && echo "anthropic auth set for $a" || echo "WARN: anthropic auth failed for $a"
              done
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: config
              mountPath: /etc/openclaw
              readOnly: true
      containers:
        - name: openclaw
          image: ghcr.io/bmwinstead/openclaw-team:sha-60613b1
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/openclaw.json
            - name: OPENCLAW_SKIP_ONBOARDING
              value: "1"
          envFrom:
            - secretRef:
                name: openclaw-secrets # all ${...} vars from the SOPS secret
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: auth
              mountPath: /home/node/.config/openclaw
            - name: config
              mountPath: /etc/openclaw
              readOnly: true
          # Gateway binds 127.0.0.1 (loopback), so probe from inside the pod via node
          # (curl was purged from the image). httpGet from kubelet would be refused.
          livenessProbe:
            exec:
              command:
                - node
                - -e
                - require('http').get('http://127.0.0.1:18789/healthz',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            exec:
              command:
                - node
                - -e
                - require('http').get('http://127.0.0.1:18789/readyz',r=>process.exit(r.statusCode<400?0:1)).on('error',()=>process.exit(1))
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-state
        - name: auth
          persistentVolumeClaim:
            claimName: openclaw-auth
        - name: config
          configMap:
            name: openclaw-config # generated by kustomize from openclaw.k8s.json5
