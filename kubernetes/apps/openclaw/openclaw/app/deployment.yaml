---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw
  labels:
    app: openclaw
spec:
  replicas: 1 # the Gateway is a singleton
  strategy:
    type: Recreate # RWO PVCs can't be held by two pods during rollout
  selector:
    matchLabels:
      app: openclaw
  template:
    metadata:
      labels:
        app: openclaw
    spec:
      securityContext:
        runAsUser: 1000 # `node` user in the image
        runAsGroup: 1000
        fsGroup: 1000 # makes the PVCs writable by node
      # Seed baked workspaces into the state PVC without clobbering agent edits.
      initContainers:
        - name: seed-workspaces
          image: ghcr.io/bmwinstead/openclaw-team:sha-60613b1
          command:
            - "sh"
            - "-c"
          args:
            - mkdir -p /home/node/.openclaw/workspaces && cp -rn /opt/openclaw-workspaces/. /home/node/.openclaw/workspaces/ && echo "workspaces seeded"
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
      containers:
        - name: openclaw
          image: ghcr.io/bmwinstead/openclaw-team:sha-60613b1
          ports:
            - name: gateway
              containerPort: 18789
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /etc/openclaw/openclaw.json
            - name: OPENCLAW_SKIP_ONBOARDING
              value: "1"
            # Pre-install the OpenShell plugin at startup (survives the state PVC mount).
            - name: OPENCLAW_EXTENSIONS
              value: "@openclaw/openshell-sandbox"
          envFrom:
            - secretRef:
                name: openclaw-secrets # all ${...} vars from the SOPS secret
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: auth
              mountPath: /home/node/.config/openclaw
            - name: config
              mountPath: /etc/openclaw
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: openclaw-state
        - name: auth
          persistentVolumeClaim:
            claimName: openclaw-auth
        - name: config
          configMap:
            name: openclaw-config # generated by kustomize from openclaw.k8s.json5
