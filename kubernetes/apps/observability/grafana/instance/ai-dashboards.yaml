---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
# vLLM serving metrics (throughput, TTFT, request latency, KV-cache utilization,
# running vs waiting). KubeAI's purpose-built dashboard, tailored to its metric labels.
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: kubeai-vllm
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: observability
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  url: https://raw.githubusercontent.com/kubeai-project/kubeai/main/examples/observability/vllm-grafana-dashboard.json
  resyncPeriod: 30m
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/grafana.integreatly.org/grafanadashboard_v1beta1.json
# GPU hardware metrics from DCGM exporter (utilization, VRAM, temp, power, clocks).
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: nvidia-dcgm
spec:
  allowCrossNamespaceImport: true
  instanceSelector:
    matchLabels:
      dashboards: grafana
  folder: observability
  datasources:
    - datasourceName: prometheus
      inputName: DS_PROMETHEUS
  grafanaCom:
    id: 12239
