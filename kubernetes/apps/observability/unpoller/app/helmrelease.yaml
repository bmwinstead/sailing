---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: unpoller
spec:
  chart:
    spec:
      chart: unpoller
      version: 2.1.0
      sourceRef:
        kind: HelmRepository
        name: unpoller
  interval: 1h
  values:
    dashboards:
      create: true
      grafana:
        create: false
        selectorLabels:
          dashboards: grafana
    upConfig: |-
      [poller]
          debug = false
          quiet = false
          plugins = []
      [prometheus]
        disable = false
        http_listen = "0.0.0.0:9130"
        report_errors = false
      [influxdb]
        disable = true
      [unifi]
          dynamic = false
      [loki]
          disable = true
      [[unifi.controller]]
          url        = "https://10.20.0.1"
          user       = "${UNPOLLER_USER}"
          pass       = "${UNPOLLER_PASS}"
          sites      = ["all"]
          save_ids   = true
          save_dpi   = false
          save_sites = true
          hash_pii   = false
          verify_ssl = false
