---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unpoller-secret
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/unpoller/secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: unpoller
spec:
  dependsOn:
    - name: unpoller-secret
  interval: 1h
  path: ./kubernetes/apps/observability/unpoller/app
  postBuild:
    substituteFrom:
      - name: unpoller-secret
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
