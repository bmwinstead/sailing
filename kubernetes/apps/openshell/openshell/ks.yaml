---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: openshell
spec:
  # Hard dependency: the agent-sandbox CRDs/controller must exist before the
  # OpenShell gateway can create Sandbox CRs.
  dependsOn:
    - name: agent-sandbox
  interval: 1h
  path: ./kubernetes/apps/openshell/openshell/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: openshell
  wait: false
