---
apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
data:
  recyclarr.yml: |-
    sonarr:
      sonarr:
        base_url: http://sonarr.default.svc.cluster.local
        api_key: !env_var SONARR__APP__APIKEY
        quality_definition:
          type: series
        quality_profiles:
          - name: WEB-1080p
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: WEB 1080p
              until_score: 10000
            min_format_score: 0
            quality_sort: top
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
        custom_formats:
          - trash_ids:
              - e6258996055b9fbab7e9cb2f75819294 # Arabic Dubbed
              - 2016d1676f5ee13a5b7257ff86ac9a93 # DV HDR10
              - 7878c33f1963fefb3d6c8657d46c2f0a # DV
              - 1f733af03141f068a540eec352589a89 # DTS-HD MA
              - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
              - 2f22d89048b01681dde8afe203bf2e95 # DTS X
              - 417804f7f2c4308c1f4c5d380d673a43 # SPARKS/YIFY
              - e23edd2482476e595fb990b12e7c609c # x265 (HD)
              - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
              - 90cedc1fea7ea5d11298bebd3d1d3223 # EVO (no WEBDL)
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # BR-DISK
              - dc98083864ea246d05a0169a7e2a3c3b # FreeLeech
              - 9c14d194486c4014d5ba5a5f9d77e6ea # VP9
              - 4b900e171accbfb172729b63323f9d5e # x265 (no HDR/DV)
            assign_scores_to:
              - name: WEB-1080p

    radarr:
      radarr:
        base_url: http://radarr.default.svc.cluster.local
        api_key: !env_var RADARR__APP__APIKEY
        quality_definition:
          type: movie
        quality_profiles:
          - name: HD Bluray + WEB
            reset_unmatched_scores:
              enabled: true
            upgrade:
              allowed: true
              until_quality: Bluray-1080p
              until_score: 10000
            min_format_score: 0
            quality_sort: top
            qualities:
              - name: Bluray-1080p
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
        custom_formats:
          - trash_ids:
              - 496f355514737f7d83bf7aa4d24f8169 # TrueHD Atmos
              - 2f22d89048b01681dde8afe203bf2e95 # DTS X
              - 1f733af03141f068a540eec352589a89 # DTS-HD MA
              - 2016d1676f5ee13a5b7257ff86ac9a93 # DV HDR10
              - 7878c33f1963fefb3d6c8657d46c2f0a # DV
              - e23edd2482476e595fb990b12e7c609c # x265 (HD)
              - 9c14d194486c4014d5ba5a5f9d77e6ea # VP9
              - 417804f7f2c4308c1f4c5d380d673a43 # SPARKS/YIFY
              - dc98083864ea246d05a0169a7e2a3c3b # FreeLeech
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # BR-DISK
              - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
              - 90cedc1fea7ea5d11298bebd3d1d3223 # EVO (no WEBDL)
              - 4b900e171accbfb172729b63323f9d5e # x265 (no HDR/DV)
            assign_scores_to:
              - name: HD Bluray + WEB
