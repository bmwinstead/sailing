---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: audiobookshelf
spec:
  chartRef:
    kind: OCIRepository
    name: audiobookshelf
  interval: 1h
  values:
    controllers:
      audiobookshelf:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: advplyr/audiobookshelf
              tag: "2.35.1"
            env:
              TZ: America/New_York
              PORT: &port 80
            probes:
              liveness:
                enabled: true
                spec:
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthcheck
                    port: *port
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/name: Audiobookshelf
          gethomepage.dev/description: Audiobook and podcast server
          gethomepage.dev/group: Media
          gethomepage.dev/icon: audiobookshelf
          gethomepage.dev/href: "https://audiobookshelf.${SECRET_DOMAIN}"
          gethomepage.dev/siteMonitor: "https://audiobookshelf.${SECRET_DOMAIN}"
          gethomepage.dev/widget.type: audiobookshelf
          gethomepage.dev/widget.url: "http://audiobookshelf.default.svc.cluster.local"
          gethomepage.dev/widget.key: "${AUDIOBOOKSHELF_API_KEY}"
        hostnames:
          - "audiobookshelf.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: audiobookshelf-longhorn
        globalMounts:
          - path: /config
      metadata:
        type: emptyDir
        globalMounts:
          - path: /metadata
      audiobooks:
        existingClaim: media-books
        globalMounts:
          - path: /audiobooks
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
